name: nvEnvy
options:
  bundleIdPrefix: com.nvenvy
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

packages:
  NvEnvyCore:
    path: ../NvEnvyCore
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    from: "2.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.5.0"

targets:
  nvEnvy:
    type: application
    platform: macOS
    info:
      path: nvEnvy/Info.plist
      properties:
        CFBundleIconFile: AppIcon
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        SUFeedURL: "https://nvenvy.com/appcast.xml"
        NSAppleScriptEnabled: true
        OSAScriptingDefinition: nvEnvy.sdef
        NSServices:
          - NSMenuItem:
              default: "nvEnvy: New Note from Selection"
            NSMessage: createFromSelection
            NSPortName: nvEnvy
            NSSendTypes:
              - public.utf8-plain-text
              - public.rtf
              - public.html
        CFBundleURLTypes:
          - CFBundleURLName: nvEnvy URL Scheme
            CFBundleURLSchemes:
              - nvenvy
              - nv
        CFBundleDocumentTypes:
          - CFBundleTypeName: Markdown
            CFBundleTypeExtensions:
              - md
              - markdown
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
          - CFBundleTypeName: Plain Text
            CFBundleTypeExtensions:
              - txt
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
          - CFBundleTypeName: Rich Text
            CFBundleTypeExtensions:
              - rtf
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
          - CFBundleTypeName: HTML
            CFBundleTypeExtensions:
              - html
              - htm
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
          - CFBundleTypeName: RTFD
            CFBundleTypeExtensions:
              - rtfd
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
          - CFBundleTypeName: Web Archive
            CFBundleTypeExtensions:
              - webarchive
            CFBundleTypeRole: Viewer
            LSHandlerRank: None
    sources:
      - nvEnvy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nvenvy.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 nvEnvy. All rights reserved."
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: nvEnvy/nvEnvy.entitlements
        ARCHS: "$(ARCHS_STANDARD)"
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    dependencies:
      - package: NvEnvyCore
      - package: KeyboardShortcuts
      - package: Sparkle
    entitlements:
      path: nvEnvy/nvEnvy.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.bookmarks.app-scope: true
        com.apple.security.network.client: true
